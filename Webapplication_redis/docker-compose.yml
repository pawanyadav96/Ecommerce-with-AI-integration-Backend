services:

  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: product_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: testingProduct
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: user
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: product_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot App ─────────────────────────────────────────
  app:
    build:
      context: .          # current folder = Webapplication_redis
      dockerfile: Dockerfile
    container_name: product_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/testingProduct
      DB_USER: postgres
      DB_PASS: user
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OLLAMA_URL: http://host.docker.internal:11434

volumes:
  postgres_data:
  redis_data: